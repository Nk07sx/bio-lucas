name: Deploy para Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH rsync
        run: |
          sudo apt-get install -y sshpass rsync
          sshpass -p "${{ secrets.SSH_PASSWORD }}" rsync -avzr --delete \
            -e "ssh -p 65002 -o StrictHostKeyChecking=no" \
            --exclude='.git' --exclude='.github' \
            ./ u417936031@45.132.157.155:/home/u417936031/domains/infinityia.cloud/public_html/bio/
